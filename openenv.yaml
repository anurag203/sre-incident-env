spec_version: 1
name: sre_incident_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: easy
    title: "Service OOM Crash"
    description: "A memory leak in order-service causes OOM crashes. Investigate, diagnose, and restart the affected service."
    max_steps: 10
    difficulty: easy
  - id: medium
    title: "Database Slow Query Causing Latency Cascade"
    description: "A long-running query on db-primary degrades downstream services. Kill the query and add an index."
    max_steps: 15
    difficulty: medium
  - id: hard
    title: "Bad Deploy Cascading Failure"
    description: "A faulty auth-service deployment triggers cascading failures across the stack. Rollback the deploy, restart affected services, and stabilize the system."
    max_steps: 20
    difficulty: hard
  - id: cache_failure
    title: "Cache Layer Collapse"
    description: "cache-redis OOM crash forces all services to hit db-primary directly, overwhelming it. Identify the root cause and restore the cache layer."
    max_steps: 12
    difficulty: medium
  - id: memory_leak
    title: "Memory Leak from Bad Deploy"
    description: "Deploy v3.1.0 to user-service introduced a memory leak that eventually killed the process, cascading failures to order-service, payment-service, and beyond. Roll back and restore."
    max_steps: 18
    difficulty: hard
